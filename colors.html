<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Types of color</title>
    <style>
div{
    color: rgb(200, 0, 50);
}
p{
    background-color: hsla(120, 60%, 70%, 0.3); 
    color: hsl(240, 100%, 50%);
}
    </style>
</head>
<body>
    <div>
        This is a color div.
    </div>
    <p>This is a p tag contain some different style color property.</p>
</body>
</html>
