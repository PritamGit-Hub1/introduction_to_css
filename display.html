<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Property</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        div{
            background-color: yellow;
        }
        span{
            background-color: red;
            border: 2px solid black;
        }
    </style>
</head>
<body>
    <div>I am a div</div>
    <span>I am a span 1</span>
    <span>I am a span 2</span>
</body>
</html>
