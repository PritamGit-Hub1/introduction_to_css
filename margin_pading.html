<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margin And Padding</title>
    <style>
        h1{
           border: 2px solid red;
           margin: 23px;
           padding: 20px;
        }
        p{
            border: 2px solid green;
            margin: 23px;
            padding: 50px 50px 50px 50px;
        }
    </style>
</head>
<body>
    <h1>Margin</h1>
    <p>Padding</p>
</body>
</html>
